name: Build Android APK From ZIP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract Project ZIP
      run: |
        if [ -f quran-alzhaby.zip ]; then
          echo "Extracting quran-alzhaby.zip..."
          unzip quran-alzhaby.zip -d .
          rm quran-alzhaby.zip
        else
          echo "ZIP file not found!"
          exit 1
        fi

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Ensure .env file exists
      run: |
        if [ ! -f .env ]; then
          touch .env
        fi

    - name: Create Fake Keystore File
      run: |
        # توليد ملف المفتاح الوهمي في المجلد الرئيسي وفي مجلد app عشان نضمن إن الأندرويد يشوفه
        keytool -genkey -v -keystore app-debug.keystore -alias debugConfig -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
        cp app-debug.keystore app/app-debug.keystore || true

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build APK
      run: gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: quran-app-apk
        path: |
          **/build/outputs/apk/debug/*.apk
